---
- name: Check if Helm is installed
  ansible.builtin.command: helm version
  register: helm_check
  failed_when: false
  changed_when: false

- name: Download Helm install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: "0700"
  when: helm_check.rc != 0

- name: Install Helm
  ansible.builtin.command: /tmp/get-helm.sh
  when: helm_check.rc != 0
  changed_when: true

- name: Add Cilium Helm repo
  ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
  changed_when: false

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Check if Cilium is already installed
  ansible.builtin.command: helm status cilium -n kube-system
  register: cilium_status
  failed_when: false
  changed_when: false

- name: Install Cilium
  ansible.builtin.command: >-
    helm install cilium cilium/cilium
    --version {{ cilium_tag }}
    --namespace kube-system
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ apiserver_endpoint }}
    --set k8sServicePort=6443
    --set ipam.mode=kubernetes
    --set operator.replicas=2
    --set hubble.relay.enabled={{ cilium_hubble | string | lower }}
    --set hubble.ui.enabled={{ cilium_hubble | string | lower }}
    --set l2announcements.enabled=false
    --set externalIPs.enabled=true
    --wait
    --timeout 5m
  when: cilium_status.rc != 0
  changed_when: true

- name: Wait for Cilium DaemonSet to be ready
  ansible.builtin.command: >-
    k3s kubectl rollout status daemonset/cilium -n kube-system --timeout=300s
  changed_when: false
  retries: 3
  delay: 10
