---
- name: Stop k3s-init if already running
  ansible.builtin.systemd:
    name: k3s-init
    state: stopped
  failed_when: false

- name: Stop k3s if already running
  ansible.builtin.systemd:
    name: k3s
    state: stopped
  failed_when: false

- name: Create manifests directory for kube-vip
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: "0644"

- name: Copy kube-vip rbac manifest
  ansible.builtin.copy:
    src: kube-vip-rbac.yaml
    dest: /var/lib/rancher/k3s/server/manifests/kube-vip-rbac.yaml
    owner: root
    group: root
    mode: "0644"

- name: Template kube-vip DaemonSet manifest
  ansible.builtin.template:
    src: kube-vip.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
    owner: root
    group: root
    mode: "0644"

- name: Initialize k3s cluster via transient k3s-init service
  ansible.builtin.command:
    cmd: >-
      systemd-run -p RestartSec=2
      -p Restart=on-failure
      --unit=k3s-init
      k3s server {{ server_init_args }}
    creates: "{{ systemd_dir }}/k3s.service"
  changed_when: true

- name: Verify that all server nodes joined
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get nodes -l "node-role.kubernetes.io/control-plane=true" -o=jsonpath="{.items[*].metadata.name}"
  register: nodes
  until: nodes.rc == 0 and (nodes.stdout.split() | length) == (groups[group_name_master] | length)
  retries: "{{ retry_count }}"
  delay: 10
  changed_when: false

- name: Stop k3s-init transient service
  ansible.builtin.systemd:
    name: k3s-init
    state: stopped
  failed_when: false

- name: Copy k3s service file
  ansible.builtin.template:
    src: k3s.service.j2
    dest: "{{ systemd_dir }}/k3s.service"
    owner: root
    group: root
    mode: "0644"
  register: k3s_service

- name: Enable and restart k3s
  ansible.builtin.systemd:
    name: k3s
    daemon_reload: true
    state: restarted
    enabled: true

- name: Wait for k3s API to be available
  ansible.builtin.wait_for:
    host: "{{ apiserver_endpoint }}"
    port: 6443
    state: started
    timeout: 180
  when: ansible_hostname == hostvars[groups[group_name_master][0]]['ansible_hostname']

- name: Read node-token from first master
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token
  when: ansible_hostname == hostvars[groups[group_name_master][0]]['ansible_hostname']

- name: Store node-token fact
  ansible.builtin.set_fact:
    token: "{{ node_token.content | b64decode | regex_replace('\n', '') }}"
  when: ansible_hostname == hostvars[groups[group_name_master][0]]['ansible_hostname']

- name: Create .kube directory
  ansible.builtin.file:
    path: ~{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Copy kubeconfig to user home
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~{{ ansible_user }}/.kube/config
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Replace localhost with VIP in kubeconfig
  ansible.builtin.replace:
    path: ~{{ ansible_user }}/.kube/config
    regexp: 'https://127.0.0.1:6443'
    replace: "https://{{ apiserver_endpoint }}:6443"

- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link

- name: Create crictl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/crictl
    state: link

- name: Remove kube-vip manifest from auto-deploy dir after first run
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
    state: absent
  when: ansible_hostname == hostvars[groups[group_name_master][0]]['ansible_hostname']

- name: Remove kube-vip-rbac manifest from auto-deploy dir after first run
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/kube-vip-rbac.yaml
    state: absent
  when: ansible_hostname == hostvars[groups[group_name_master][0]]['ansible_hostname']
